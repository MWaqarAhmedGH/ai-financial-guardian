<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Maliati Dost | Premium AI Assistant</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="chat-container">
        <header>
            <div class="logo-section">
                <div class="ai-logo">A</div>
                <div class="header-text">
                    <h1>AI Maliati Dost</h1>
                    <p>Pakistani Financial Safety Assistant</p>
                </div>
            </div>
            <button id="clear-btn" class="clear-btn">Clear History</button>
        </header>
        
        <div id="chat-window" class="chat-window">
            <div class="message ai-message">
                <strong>Assalam-o-Alaikum!</strong> Main aapka premium AI maliati dost hoon. <br><br>
                Main aapko scams se bachne aur paise ki bachat ke bare mein fast aur intelligent mashwara de sakta hoon. <br><br>
                Bataiye, aaj main aapki kya madad karoon?
            </div>
        </div>

        <div class="input-area">
            <div class="input-wrapper">
                <input type="text" id="user-input" placeholder="Ask about a scam or financial advice..." autocomplete="off">
            </div>
            <button id="send-btn">Send Message</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
